<head>

<title>Onimix Sites</title>

.card{background:#12141e;border:1px solid #252638;border-radius:12px;padding:24px 32px;text-decoration:none;color:#fff;transition:border-color .2s,transform .2s;min-width:240px;text-align:center;}
.card:hover{border-color:#6366f1;transform:translateY(-3px);}
.card .icon{font-size:2rem;margin-bottom:8px;}
.card h2{font-size:1rem;font-weight:600;}
.card p{font-size:.82rem;color:#6b7280;margin-top:4px;}

<h1>Onimix</h1>
